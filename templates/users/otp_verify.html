{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow-lg">
        <div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
                Verify OTP
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                Enter the code sent to {{ phone }}
            </p>
        </div>
        <form class="mt-8 space-y-6" action="{% url 'verify_login_otp' %}" method="POST">
            {% csrf_token %}
            <div class="rounded-md shadow-sm -space-y-px">
                <div>
                    <label for="otp" class="sr-only">OTP</label>
                    {{ form.otp }}
                </div>
            </div>

            {% if form.otp.errors %}
            <div class="text-red-500 text-sm mt-2">
                {{ form.otp.errors }}
            </div>
            {% endif %}
            
            {% if form.non_field_errors %}
            <div class="text-red-500 text-sm mt-2">
                {{ form.non_field_errors }}
            </div>
            {% endif %}

            <div>
                <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-full text-white bg-brown hover:bg-gold focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brown transition duration-300 ease-in-out uppercase tracking-wider shadow-md hover:shadow-lg">
                    Verify & Login
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
