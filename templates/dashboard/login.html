<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber Login | Zion Salon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-amber-50 mb-4">
                <i class="fas fa-scissors text-amber-500 text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Barber Access</h1>
            <p class="text-gray-500 mt-2">Sign in to view your dashboard</p>
        </div>

        {% if messages %}
        <div class="mb-6">
            {% for message in messages %}
            <div class="p-3 text-sm rounded bg-red-50 text-red-600 border border-red-100">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div>
                <label for="{{ form.username.id_for_label }}"
                    class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" name="username" id="{{ form.username.id_for_label }}"
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-amber-500 focus:border-amber-500 transition-colors"
                    placeholder="Enter your username" required>
            </div>

            <div>
                <label for="{{ form.password.id_for_label }}"
                    class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" id="{{ form.password.id_for_label }}"
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-amber-500 focus:border-amber-500 transition-colors"
                    placeholder="••••••••" required>
            </div>

            <button type="submit"
                class="w-full bg-gray-900 text-white font-semibold py-3 rounded-lg hover:bg-gray-800 transition-colors shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all">
                Sign In
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="{% url 'home' %}"
                class="text-sm text-gray-500 hover:text-amber-600 flex items-center justify-center gap-2">
                <i class="fas fa-arrow-left"></i> Back to Website
            </a>
        </div>
    </div>

</body>

</html>
