{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-16">
    <div class="bg-white rounded-2xl p-8 shadow-sm border border-red-50 text-center">
        <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-exclamation-triangle text-2xl text-red-500"></i>
        </div>
        
        <h2 class="text-2xl font-bold text-gray-800 mb-4">Action Failed</h2>
        <p class="text-gray-600 mb-8">{{ message }}</p>

        <a href="{% url 'home' %}" class="inline-block px-8 py-3 bg-gray-100 hover:bg-gray-200 text-gray-800 rounded-full font-medium transition">
            Back to Home
        </a>
    </div>
</div>
{% endblock %}
