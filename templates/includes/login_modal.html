<!-- Shared Login/Check-in Modal -->
<div id="login-modal"
    class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center animate-fade-in"
    style="z-index: 10000;">
    <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl relative mx-4">
        <!-- Close Button -->
        <button type="button" onclick="closeLoginModal()"
            class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
            <i class="fas fa-times text-xl"></i>
        </button>

        <div class="text-center mb-6">
            <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-user-check text-2xl text-blue-500"></i>
            </div>
            <h3 class="text-2xl font-bold text-brown">Login / Check-in</h3>
            <p class="text-gray-500 text-sm mt-2">Enter your details to proceed.</p>
        </div>

        <div id="login-form-fields" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                <input type="text" id="login-name"
                    class="w-full px-4 py-2 rounded-xl border-2 border-gray-100 focus:border-blue-500 focus:outline-none transition-all"
                    placeholder="Enter your full name">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Mobile Number</label>
                <input type="tel" id="login-phone" maxlength="10"
                    oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);"
                    class="w-full px-4 py-2 rounded-xl border-2 border-gray-100 focus:border-blue-500 focus:outline-none transition-all"
                    placeholder="Enter 10-digit mobile number">
            </div>

            <div id="login-otp-field" class="hidden">
                <label class="block text-sm font-medium text-gray-700 mb-1">Verification OTP</label>
                <input type="text" id="login-otp" maxlength="4"
                    class="w-full text-center text-2xl font-bold tracking-[0.5em] py-3 border-2 border-gray-100 rounded-xl focus:border-blue-500 focus:outline-none transition-all"
                    placeholder="0000">
                <p class="text-xs text-blue-600 mt-2 text-center">📞 We're calling you with a 4-digit OTP.</p>
            </div>

            <p id="login-error" class="hidden text-red-500 text-sm text-center"></p>

            <button type="button" id="login-submit-btn" onclick="handleLoginSubmit()" style="background-color: #3b82f6;"
                class="w-full hover:opacity-90 text-white py-3 rounded-xl font-bold text-lg shadow-lg flex items-center justify-center transition-all">
                <span id="login-btn-text">Proceed</span>
                <i id="login-btn-icon" class="fas fa-arrow-right ml-2"></i>
                <svg id="login-loader" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg"
                    fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                    </path>
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
    let isUserLoggedIn = {% if user.is_authenticated %}true{% else %} false{% endif %};
    let requireLoginOTP = false;
    let onLoginSuccess = null; // Callback function

    function openLoginModal(callback = null) {
        onLoginSuccess = callback;
        document.getElementById('login-modal').classList.remove('hidden');
    }

    function closeLoginModal() {
        document.getElementById('login-modal').classList.add('hidden');
    }

    function getCSRFToken() {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                // Does this cookie string begin with the name we want?
                if (cookie.substring(0, 10) === ('csrftoken' + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(10));
                    break;
                }
            }
        }
        return cookieValue || '{{ csrf_token }}';
    }

    async function handleLoginSubmit() {
        const name = document.getElementById('login-name').value;
        const phone = document.getElementById('login-phone').value;
        const otp = document.getElementById('login-otp').value;
        const errorMsg = document.getElementById('login-error');
        const loader = document.getElementById('login-loader');
        const btnText = document.getElementById('login-btn-text');
        const btnIcon = document.getElementById('login-btn-icon');

        if (!name || name.length < 3) {
            errorMsg.innerText = "Please enter your full name.";
            errorMsg.classList.remove('hidden');
            return;
        }
        if (!phone || phone.length < 10) {
            errorMsg.innerText = "Please enter a valid phone number.";
            errorMsg.classList.remove('hidden');
            return;
        }

        errorMsg.classList.add('hidden');
        loader.classList.remove('hidden');
        btnText.innerText = "Processing...";
        btnIcon.classList.add('hidden');

        try {
            if (!requireLoginOTP) {
                // Step 1: Initiate Login
                const resp = await fetch('{% url "ajax_login" %}', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken() },
                    body: JSON.stringify({ first_name: name, phone_number: phone })
                });
                const data = await resp.json();

                if (data.success) {
                    if (data.require_otp) {
                        requireLoginOTP = true;
                        document.getElementById('login-otp-field').classList.remove('hidden');
                        btnText.innerText = "Verify & Login";
                    } else {
                        // Logged in directly (OTP disabled)
                        finalizeLogin(name, phone);
                    }
                } else {
                    errorMsg.innerText = data.message;
                    errorMsg.classList.remove('hidden');
                }
            } else {
                // Step 2: Verify Login OTP
                const resp = await fetch('{% url "ajax_verify" %}', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken() },
                    body: JSON.stringify({ otp: otp })
                });
                const data = await resp.json();

                if (data.success) {
                    finalizeLogin(name, phone);
                } else {
                    errorMsg.innerText = data.message;
                    errorMsg.classList.remove('hidden');
                }
            }
        } catch (err) {
            errorMsg.innerText = "Network error. Try again.";
            errorMsg.classList.remove('hidden');
        } finally {
            loader.classList.add('hidden');
            if (btnText.innerText === "Processing...") {
                btnText.innerText = requireLoginOTP ? "Verify & Login" : "Proceed";
            }
            btnIcon.classList.remove('hidden');
        }
    }

    function finalizeLogin(name, phone) {
        isUserLoggedIn = true;

        // Very Important: Update the CSRF token in all forms on the page
        const newToken = getCSRFToken();
        document.querySelectorAll('input[name="csrfmiddlewaretoken"]').forEach(input => {
            input.value = newToken;
        });

        closeLoginModal();
        if (onLoginSuccess) {
            onLoginSuccess(name, phone);
        }
    }
</script>
